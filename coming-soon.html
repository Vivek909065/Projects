    <!-- shiny badge with icon -->

      <span style="font-weight: 600; letter-spacing: 0.5px; background: linear-gradient(120deg, #f0f6fc, #b7c9e2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">REPOSITORY · LAUNCH SEQUENCE</span>

    <!-- main title with fancy grad & glow -->

      <span style="background: #1f252e; padding: 0.3rem 1.2rem; border-radius: 40px; border: 1px solid #f7816640;">⚡ LIFTOFF IN</span>

      <div style="background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(6px); border: 1px solid rgba(247, 129, 102, 0.5); border-radius: 32px; padding: 1.5rem 1.8rem; min-width: 130px; box-shadow: 0 25px 35px -12px #00000080, 0 0 0 1px #f7816630, 0 0 30px #f7816630; transform-style: preserve-3d; transition: transform 0.2s;">
        <div style="font-size: 4.8rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, #f78166, #f7b731); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 4px 6px black);" id="fancy-days">15</div>
        <div style="font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; color: #f0bda0; font-weight: 400; margin-top: 0.4rem;">DAYS</div>
        <div style="width: 40px; height: 4px; background: #f78166; border-radius: 4px; margin: 0.7rem auto 0; filter: blur(1px);"></div>
      </div>

      <!-- hours box -->
      <div style="background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(6px); border: 1px solid rgba(255, 180, 130, 0.4); border-radius: 32px; padding: 1.5rem 1.8rem; min-width: 130px; box-shadow: 0 25px 35px -12px #00000080, 0 0 0 1px #f7b73130, 0 0 30px #f7b73140;">
        <div style="font-size: 4.8rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, #ffe2b0, #f7b731); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 6px black);" id="fancy-hours">00</div>

        <div style="width: 30px; height: 4px; background: #f7b731; border-radius: 4px; margin: 0.7rem auto 0;"></div>
      </div>

      <!-- minutes box -->
      <div style="background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(6px); border: 1px solid rgba(126, 227, 180, 0.4); border-radius: 32px; padding: 1.5rem 1.8rem; min-width: 130px; box-shadow: 0 25px 35px -12px #00000080, 0 0 0 1px #7ee3b430, 0 0 30px #7ee3b440;">
        <div style="font-size: 4.8rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, #c5ffec, #7ee3b4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 6px black);" id="fancy-minutes">00</div>
        <div style="font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; color: #a7f0d0;">MINUTES</div>
        <div style="width: 30px; height: 4px; background: #7ee3b4; border-radius: 4px; margin: 0.7rem auto 0;"></div>
      </div>

      <!-- seconds box (extra sparkle) -->
      <div style="background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(6px); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 32px; padding: 1.5rem 1.8rem; min-width: 130px; box-shadow: 0 25px 35px -12px #00000080, 0 0 0 1px #ffffff30, 0 0 30px #ffffff30;">
        <div style="font-size: 4.8rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, #ffffff, #d4e6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px cyan);" id="fancy-seconds">00</div>
        <div style="font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; color: #c9d8eb;">SECONDS</div>
        <div style="width: 30px; height: 4px; background: #b3d0ff; border-radius: 4px; margin: 0.7rem auto 0; filter: blur(1px);"></div>

    </div>

    <!-- FANCY PROGRESS BAR WITH GLOW & ANIMATION -->
    <div style="width: 90%; max-width: 600px; margin: 1.5rem auto 2rem;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: #8b949e; font-size: 0.9rem; letter-spacing: 0.5px;">
        <span>🌑 LIFTOFF PROGRESS</span>
        <span style="font-family: monospace; font-weight: 600;" id="progress-percent">0%</span>
      </div>
      <div style="background: #010409; border-radius: 60px; height: 22px; border: 1px solid #30363d; padding: 2px; box-shadow: inset 0 2px 6px #000000, 0 0 30px #f7816640;">
        <div id="fancy-progress-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #f78166, #f7b731, #7ee3b4); border-radius: 60px; transition: width 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1); box-shadow: 0 0 20px #f78166; position: relative;">
          <!-- little shine animation -->
          <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg) translateX(-100%); animation: shine 3s infinite;"></div>
        </div>
      </div>
    </div>

    <!-- github style call to action + interactive tip -->
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 2rem; color: #e6edf3;">
      <span style="background: #21262d; border-radius: 60px; padding: 0.6rem 1.6rem; border: 1px solid #3d444d; display: inline-flex; align-items: center; gap: 8px; backdrop-filter: blur(4px);">
        <span style="font-size: 1.4rem;">⭐</span> <span>Star to track launch</span>
      </span>
      <span style="background: #21262d; border-radius: 60px; padding: 0.6rem 1.6rem; border: 1px solid #3d444d; display: inline-flex; align-items: center; gap: 8px; backdrop-filter: blur(4px);">
        <span style="font-size: 1.4rem;">🔔</span> <span>Watch for updates</span>
      </span>
      <span style="background: #21262d; border-radius: 60px; padding: 0.6rem 1.6rem; border: 1px solid #3d444d; display: inline-flex; align-items: center; gap: 8px; backdrop-filter: blur(4px);">
        <span style="font-size: 1.4rem;">🚀</span> <span>15‑day countdown</span>
      </span>
    </div>

    <!-- footer with fancy animated pulse -->
    <div style="margin-top: 2.4rem; font-size: 0.9rem; color: #6e7681; border-top: 1px dashed #2d333b; padding-top: 1.8rem; display: flex; align-items: center; justify-content: center; gap: 10px;">
      <span style="display: inline-block; width: 10px; height: 10px; background: #f78166; border-radius: 50%; box-shadow: 0 0 12px #f78166; animation: pulse 1.8s infinite;"></span>
      <span>✨ countdown live · repository awakens in <span style="font-weight: 600; color: #f78166;" id="footer-days">15</span> days ✨</span>
      <span style="display: inline-block; width: 10px; height: 10px; background: #7ee3b4; border-radius: 50%; box-shadow: 0 0 12px #7ee3b4; animation: pulse 1.8s infinite reverse;"></span>
    </div>

<!-- animation keyframes (fancy shine + pulse) -->
<style>
  @keyframes shine {
    0% { transform: skewX(-20deg) translateX(-100%); }
    40%, 100% { transform: skewX(-20deg) translateX(200%); }
  }
  @keyframes pulse {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.2); box-shadow: 0 0 24px #f78166; }
    100% { opacity: 1; transform: scale(1); }
  }
  /* tiny extra hover effect on boxes */
  .timer-box:hover { transform: scale(1.02) translateY(-4px); transition: 0.2s; }
</style>

<!-- ========== FANCY 15‑DAY COUNTDOWN SCRIPT (with flip on zeros) ========== -->
<script>
  (function() {
    // 15 days from exact page load (luxury timer)
    const now = new Date().getTime();
    const target = now + (15 * 24 * 60 * 60 * 1000);  // 15 days in ms

    const daysEl = document.getElementById('fancy-days');
    const hoursEl = document.getElementById('fancy-hours');
    const minutesEl = document.getElementById('fancy-minutes');
    const secondsEl = document.getElementById('fancy-seconds');
    const progressFill = document.getElementById('fancy-progress-fill');
    const progressPercent = document.getElementById('progress-percent');
    const footerDays = document.getElementById('footer-days');

    function pad(num) {
      return num < 10 ? '0' + num : num;
    }

    function update() {
      const current = new Date().getTime();
      const distance = target - current;

      if (distance <= 0) {
        // launch day !
        daysEl.textContent = '0';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        progressFill.style.width = '100%';
        progressPercent.textContent = '100%';
        if (footerDays) footerDays.textContent = '0';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (86400 * 1000)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (3600 * 1000)) / (1000 * 60));
      const seconds = Math.floor((distance % (60 * 1000)) / 1000);

      daysEl.textContent = days;
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);

      // progress based on 15 days total
      const total = 15 * 24 * 60 * 60 * 1000;
      const elapsed = total - distance;
      let percent = (elapsed / total) * 100;
      percent = Math.min(100, Math.max(0, percent));
      progressFill.style.width = percent + '%';
      progressPercent.textContent = Math.round(percent) + '%';

      if (footerDays) footerDays.textContent = days;
    }

    update();
    setInterval(update, 1000);

    // optional: assign hover class to each box (just for micro‐interactions)
    let boxes = document.querySelectorAll('[style*="border-radius: 32px;"]'); // crude but works
    boxes.forEach(b => b.classList.add('timer-box'));
  })();
</script>
